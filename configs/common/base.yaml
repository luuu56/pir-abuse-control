app_name: pir-abuse-control
log_level: INFO
log_dir: logs

issuer:
  host: 127.0.0.1
  port: 8001

verifier:
  host: 127.0.0.1
  port: 8002

pir_server:
  host: 127.0.0.1
  port: 8003
  stub_latency_sec: 1.0

