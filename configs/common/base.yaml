app_name: pir-abuse-control
log_level: INFO
log_dir: logs

issuer:
  host: 127.0.0.1
  port: 8001

verifier:
  host: 127.0.0.1
  port: 8002

# configs/common/base.yaml 中的 pir_server 块更新如下：
pir_server:
  host: "127.0.0.1"
  port: 8003
  # 运行模式: "stub" 或 "subprocess"
  engine_mode: "subprocess"
  stub_latency_sec: 1.0

  # 独立的真实引擎桥接配置块
  subprocess:
    engine_cmd: ["python", "scripts/mock_external_pir.py"]
    engine_timeout_sec: 15.0
    working_dir: ""  # 为空则默认使用项目 root_path

# configs/common/base.yaml 追加/修改
auditor:
  host: 127.0.0.1
  port: 8004
  ledger_path: "logs/audit_ledger.jsonl"
  # 原型级 HMAC 密钥
  hmac_secret: "day25_tamper_evident_secret_key"

redis:
  host: 127.0.0.1
  port: 6379
  db: 0

client:
  client_id: client_test_01
  timeout: 5

# configs/common/base.yaml 新增
epoch:
  duration_sec: 3600  # 默认 1 小时一个纪元
  grace_window_sec: 300 # 允许 5 分钟的跨纪元宽限期（可选，用于处理时钟漂移）

